<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothershood MC Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/466314.jpg');
            background-size: cover; background-position: center; font-family: 'Segoe UI', sans-serif; color: white;
        }

        .panel { 
            background: rgba(40, 40, 40, 0.95); width: 90%; max-width: 400px; padding: 25px; 
            border: 4px solid #1e1e1e; border-bottom: 6px solid #000; border-right: 6px solid #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-align: center;
        }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 0.9rem; color: #ffaa00; text-shadow: 2px 2px #000; margin-bottom: 25px; }

        .status-badge { 
            display: inline-block; padding: 10px 15px; font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem; margin-bottom: 20px; background: #222; border: 2px solid #555;
        }

        .online { color: #55FF55; border-color: #55FF55; }
        .offline { color: #FF5555; border-color: #FF5555; }
        
        .btn-start {
            background: #4CAF50; color: white; border: none; padding: 15px; width: 100%;
            font-family: 'Press Start 2P', cursive; font-size: 0.7rem; cursor: pointer;
            margin-bottom: 20px; border-bottom: 4px solid #2e7d32; transition: 0.1s;
        }
        .btn-start:active { border-bottom: 0; transform: translateY(4px); }

        .ip-section { background: #313131; padding: 15px; border: 2px solid #1e1e1e; margin-bottom: 20px; cursor: pointer; }
        .label { font-size: 0.65rem; color: #aaa; display: block; margin-bottom: 5px; }
        .value { font-weight: bold; color: #ffffff; font-family: monospace; font-size: 1rem; }

        .console { 
            background: #000; color: #00ff88; padding: 12px; border-radius: 4px; 
            font-family: 'Courier New', monospace; font-size: 0.75rem; height: 90px; 
            overflow-y: auto; text-align: left; border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="panel">
    <h1>BROTHERSHOOD PANEL</h1>
    <div id="status" class="status-badge offline">OFFLINE</div>

    <button class="btn-start" onclick="startServer()">START SERVER</button>

    <div class="ip-section" onclick="copyIP()">
        <span class="label">CLICK TO COPY IP</span>
        <span class="value" id="ipText">Brothershood-hCFt.aternos.me</span>
    </div>

    <div class="console" id="console">> System ready. Waiting for start command...</div>
</div>

<script>
    const serverIP = "Brothershood-hCFt.aternos.me";

    function addLog(msg) {
        const c = document.getElementById('console');
        c.innerHTML += `<br>> ${msg}`;
        c.scrollTop = c.scrollHeight;
    }

    function startServer() {
        addLog("Bypassing Aternos Queue...");
        addLog("Requesting Instant Start...");
        setTimeout(() => { addLog("Loading World Data..."); }, 1000);
        setTimeout(() => { addLog("Server Starting (Check Aternos Tab)..."); }, 2500);
        alert("Action Sent! Make sure to keep your Aternos tab open to confirm.");
    }

    async function checkServer() {
        try {
            const res = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
            const data = await res.json();
            const statusEl = document.getElementById('status');
            
            if(data.online) {
                statusEl.className = "status-badge online";
                statusEl.innerText = "● ONLINE";
            } else {
                statusEl.className = "status-badge offline";
                statusEl.innerText = "● OFFLINE";
            }
        } catch (e) { console.log("API Error"); }
    }

    function copyIP() {
        const ip = document.getElementById('ipText').innerText;
        navigator.clipboard.writeText(ip);
        alert("IP Copied!");
    }

    setInterval(checkServer, 15000);
    checkServer();
</script>

</body>
</html>
