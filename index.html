<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothershood MC Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/466314.jpg');
            background-size: cover; background-position: center; font-family: 'Segoe UI', sans-serif; color: white;
            overflow: hidden;
        }

        .panel { 
            background: rgba(30, 30, 30, 0.95); width: 90%; max-width: 400px; padding: 25px; 
            border: 4px solid #1e1e1e; border-bottom: 6px solid #000; border-right: 6px solid #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center;
        }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 0.85rem; color: #ffaa00; text-shadow: 2px 2px #000; margin-bottom: 20px; }

        .status-badge { 
            display: inline-block; padding: 10px 20px; font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem; margin-bottom: 20px; background: #000; border: 2px solid #444;
        }

        .online { color: #55FF55; border-color: #55FF55; text-shadow: 0 0 5px #55FF55; }
        .offline { color: #FF5555; border-color: #FF5555; text-shadow: 0 0 5px #FF5555; }
        
        .btn-start {
            background: #388e3c; color: white; border: none; padding: 15px; width: 100%;
            font-family: 'Press Start 2P', cursive; font-size: 0.7rem; cursor: pointer;
            margin-bottom: 20px; border-bottom: 4px solid #1b5e20; border-radius: 4px;
        }
        .btn-start:hover { background: #45a049; }
        .btn-start:active { border-bottom: 0; transform: translateY(2px); }

        .ip-section { background: #252525; padding: 15px; border: 2px solid #444; margin-bottom: 20px; cursor: pointer; border-radius: 4px; }
        .label { font-size: 0.6rem; color: #888; display: block; margin-bottom: 5px; font-family: 'Press Start 2P', cursive; }
        .value { font-weight: bold; color: #fff; font-family: monospace; font-size: 0.95rem; }

        .console { 
            background: #000; color: #00ff88; padding: 10px; border-radius: 4px; 
            font-family: 'Courier New', monospace; font-size: 0.7rem; height: 70px; 
            overflow-y: auto; text-align: left; border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="panel">
    <h1>BROTHERSHOOD PANEL</h1>
    <div id="status" class="status-badge offline">OFFLINE</div>

    <button class="btn-start" onclick="startInfo()">START SERVER</button>

    <div class="ip-section" onclick="copyIP()">
        <span class="label">SERVER IP</span>
        <span class="value" id="ipText">Brothershood-hCFt.aternos.me</span>
    </div>

    <div class="console" id="console">> System ready...</div>
</div>

<script>
    const serverIP = "Brothershood-hCFt.aternos.me";

    async function checkServer() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}`);
            const data = await response.json();
            
            if(data.online) {
                statusEl.className = "status-badge online";
                statusEl.innerText = "● ONLINE";
            } else {
                statusEl.className = "status-badge offline";
                statusEl.innerText = "● OFFLINE";
            }
        } catch (error) {
            console.log("Sync error");
        }
    }

    function addLog(msg) {
        const c = document.getElementById('console');
        c.innerHTML = `> ${msg}`; 
    }

    // Yahan se ALERT hata diya hai
    function startInfo() {
        addLog("Requesting start... Check Aternos website.");
    }

    function copyIP() {
        const ip = document.getElementById('ipText').innerText;
        navigator.clipboard.writeText(ip);
        addLog("IP copied to clipboard!");
    }

    setInterval(checkServer, 10000);
    checkServer();
</script>

</body>
</html>
