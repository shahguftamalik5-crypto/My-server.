<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothershood MC Panel</title>
    <style>
        /* Minecraft Font */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            /* Minecraft Background Image */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/466314.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .panel { 
            background: rgba(40, 40, 40, 0.95); 
            width: 90%; 
            max-width: 400px; 
            padding: 25px; 
            border: 4px solid #1e1e1e; 
            border-bottom: 6px solid #000;
            border-right: 6px solid #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
        }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.9rem; 
            color: #ffaa00; 
            text-shadow: 2px 2px #000;
            margin-bottom: 25px;
        }

        .status-badge { 
            display: inline-block; 
            padding: 10px 15px; 
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem; 
            margin-bottom: 20px;
            background: #222;
            border: 2px solid #555;
        }

        .online { color: #55FF55; border-color: #55FF55; box-shadow: 0 0 10px rgba(85, 255, 85, 0.3); }
        .offline { color: #FF5555; border-color: #FF5555; }
        
        .ip-section { 
            background: #313131; 
            padding: 15px; 
            border: 2px solid #1e1e1e;
            margin-bottom: 20px; 
            cursor: pointer;
            border-radius: 4px;
        }
        .ip-section:hover { background: #444; border-color: #00f2ff; }
        .label { font-size: 0.65rem; color: #aaa; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .value { font-weight: bold; color: #ffffff; font-family: monospace; font-size: 1rem; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-item { background: #222; padding: 12px; border: 2px solid #3c3c3c; border-radius: 4px; }

        .console { 
            background: #000; 
            color: #00ff88; 
            padding: 12px; 
            border-radius: 4px; 
            font-family: 'Courier New', monospace; 
            font-size: 0.75rem; 
            height: 90px; 
            overflow-y: auto; 
            text-align: left; 
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="panel">
    <h1>BROTHERSHOOD PANEL</h1>
    <div id="status" class="status-badge offline">LOADING...</div>

    <div class="ip-section" onclick="copyIP()">
        <span class="label">CLICK TO COPY IP</span>
        <span class="value" id="ipText">Brothershood-hCFt.aternos.me</span>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <span class="label">PLAYERS</span>
            <span class="value" id="playerCount">0 / 0</span>
        </div>
        <div class="info-item">
            <span class="label">VERSION</span>
            <span class="value" id="version">---</span>
        </div>
    </div>

    <div class="console" id="console">> Connecting to server database...</div>
</div>

<script>
    // Aapki Asli IP
    const serverIP = "Brothershood-hCFt.aternos.me";

    async function checkServer() {
        const consoleBox = document.getElementById('console');
        try {
            const res = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
            const data = await res.json();
            const statusEl = document.getElementById('status');
            
            if(data.online) {
                statusEl.className = "status-badge online";
                statusEl.innerText = "● ONLINE";
                document.getElementById('playerCount').innerText = `${data.players.online} / ${data.players.max}`;
                document.getElementById('version').innerText = data.version || "Java/Bedrock";
                addLog(`Success: Server is Online.`);
            } else {
                statusEl.className = "status-badge offline";
                statusEl.innerText = "● OFFLINE";
                document.getElementById('playerCount').innerText = "0 / 0";
                document.getElementById('version').innerText = "---";
                addLog("Status: Server is currently Offline.");
            }
        } catch (e) { 
            addLog("Error: Could not reach Aternos API."); 
        }
    }

    function addLog(msg) {
        const c = document.getElementById('console');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        c.innerHTML += `<br>[${time}] > ${msg}`;
        c.scrollTop = c.scrollHeight;
    }

    function copyIP() {
        const ip = document.getElementById('ipText').innerText;
        navigator.clipboard.writeText(ip);
        alert("IP Copied: " + ip + "\nNow paste it in Minecraft!");
    }

    // Refresh every 20 seconds
    setInterval(checkServer, 20000);
    checkServer();
</script>

</body>
</html>
