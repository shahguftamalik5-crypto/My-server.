<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Panel</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #333; }
        .btn { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        .console { background: black; color: #0f0; padding: 15px; margin-top: 20px; text-align: left; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Minecraft Control Panel</h1>
        <p>Status: <span style="color:#4CAF50">● Online</span></p>
        <button class="btn start">START SERVER</button>
        <button class="btn stop">STOP SERVER</button>
        <div class="console">
            > System Ready...<br>
            > Waiting for commands...
        </div>
    </div>
</body>
</html>
